server:
  port: 8082

spring:
  cloud:
    gateway:
      server:
        webmvc:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: movie-service-route
              uri: lb://movieService
              predicates:
                - Path=/movies/**
            - id: booking-service-route
              uri: lb://bookingService
              predicates:
                - Path=/bookings/**
